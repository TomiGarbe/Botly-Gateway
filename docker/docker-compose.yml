name: evolution

services:
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "${EVOLUTION_PORT:-8080}:8080"
    env_file:
      - ../config/.env
    environment:
      # Base
      SERVER_PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_COLOR: "true"
      # Logs de Baileys (librería de WhatsApp): fatal|error|warn|info|debug|trace|silent
      LOG_BAILEYS: debug
      # Base de datos
      # DATABASE_CONNECTION_URI es la variable que Evolution v2 lee internamente
      # DATABASE_URL es la que usa Prisma — ambas deben apuntar a "postgres" (service name), no localhost
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      # Redis
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      # Auth
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # Instancias
      DEL_INSTANCE: "false"
      CONFIG_SESSION_PHONE_CLIENT: "Evolution API"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      # WhatsApp Cloud (canal meta). Sin estas variables Evolution usa sus
      # defaults: Graph API v18.0 (EXPIRADA) y el verify token publico "evolution".
      WA_BUSINESS_URL: https://graph.facebook.com
      WA_BUSINESS_VERSION: ${META_GRAPH_VERSION:-v23.0}
      WA_BUSINESS_TOKEN_WEBHOOK: ${WA_BUSINESS_TOKEN_WEBHOOK:?definir en config/.env}
      WA_BUSINESS_LANGUAGE: ${WA_BUSINESS_LANGUAGE:-es}
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - evolution_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:17
    container_name: evolution_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"   # expuesto al host para PgAdmin/DBeaver
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evolution_net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  redis:
    image: redis:7
    container_name: evolution_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evolution_net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: evolution_gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-9000}:9000"
    env_file:
      - ../config/.env
    environment:
      GATEWAY_API_KEY: ${GATEWAY_API_KEY}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://gateway-server.botly.com.ar}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://gateway.botly.com.ar,http://localhost:5174,http://127.0.0.1:5174}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-https?://(localhost|127\.0\.0\.1)(:\d+)?}
      CORS_DEBUG: ${CORS_DEBUG:-false}
      EVOLUTION_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      BOT_WEBHOOK_URL: ${BOT_WEBHOOK_URL:-}
      ENABLE_GROUP_MESSAGES: ${ENABLE_GROUP_MESSAGES:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      INSTANCE_API_KEYS_PATH: /var/lib/botly/instance_api_keys.json
      INSTANCE_WEBHOOKS_PATH: /var/lib/botly/instance_webhooks.json
      MEDIA_CACHE_DIR: /var/lib/botly/media_cache
      # Deben vivir en el volumen persistente: los defaults apuntan a /tmp y las
      # credenciales oficiales se perderian al recrear el contenedor.
      CONNECTION_METADATA_PATH: /var/lib/botly/connection_metadata.json
      OFFICIAL_CREDENTIALS_PATH: /var/lib/botly/official_credentials.json
      META_RESOURCES_PATH: /var/lib/botly/meta_resources.json
      CHANNEL_RECORDS_PATH: /var/lib/botly/channel_records.json
      # Meta / WhatsApp Cloud — Embedded Signup con Configuration ID
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_EMBEDDED_SIGNUP_CONFIG_ID: ${META_EMBEDDED_SIGNUP_CONFIG_ID:-}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION:-v23.0}
      META_SIGNUP_TIMEOUT_SECONDS: ${META_SIGNUP_TIMEOUT_SECONDS:-30}
    volumes:
      - gateway_data:/var/lib/botly
    depends_on:
      evolution:
        condition: service_started
    networks:
      - evolution_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  evolution_instances:
    name: evolution_instances_data
  postgres_data:
    name: evolution_postgres_data
  redis_data:
    name: evolution_redis_data
  gateway_data:
    name: evolution_gateway_data

networks:
  evolution_net:
    name: evolution_net
    driver: bridge
    driver_opts:
      # WSL2 en Windows tiene overhead extra — MTU 1500 fragmenta paquetes grandes
      # y el WebSocket de WhatsApp los descarta. 1450 es el valor seguro para WSL2.
      com.docker.network.driver.mtu: "1450"
